spring.application.name=event-mng

server.port=8080

# Database Configuration (Railway MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# JWT Configuration
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=3600
application.security.jwt.refresh-expiration=360000

# Mail Configuration (Brevo SMTP)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
app.mail.from=${MAIL_FROM}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

# Jackson Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false

# Application URLs
app.frontend.url=${FRONTEND_URL}
app.backend.url=${BACKEND_URL}

# Mobile app deep link used after payment redirect
app.payment.deep-link.scheme=${PAYMENT_DEEP_LINK_SCHEME}
app.payment.deep-link.host=${PAYMENT_DEEP_LINK_HOST}
app.payment.deep-link.path=${PAYMENT_DEEP_LINK_PATH}

# File Storage Configuration
app.upload.dir=uploads
app.file.base-url=${app.backend.url}/images

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
