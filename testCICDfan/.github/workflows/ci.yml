name: Test CI/CD
run-name: ${{ github.actor }} is testing the workflow!
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with Maven
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Build with Maven
        run: ./mvnw package -DskipTests

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.D_USERNAME }}
          password: ${{ secrets.D_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.D_USERNAME }}/testcicd:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            
            echo "${{ secrets.D_PASSWORD }}" | docker login -u "${{ secrets.D_USERNAME }}" --password-stdin
            
            IMAGE_TAG="${{ github.sha }}"
            IMAGE_NAME="${{ secrets.D_USERNAME }}/testcicd"
            
            docker pull $IMAGE_NAME:$IMAGE_TAG
            
            docker stop event-app || true
            docker rm event-app || true
            
            docker run -d \
            --name event-app \
            -p 8080:8080 \
            --restart always \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            -e CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            -e CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            -e MAIL_FROM="${{ secrets.MAIL_FROM }}" \
            -e SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
            -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            -e PAYOS_API_KEY="${{ secrets.PAYOS_API_KEY }}" \
            -e PAYOS_CHECKSUM_KEY="${{ secrets.PAYOS_CHECKSUM_KEY }}" \
            -e PAYOS_CLIENT_ID="${{ secrets.PAYOS_CLIENT_ID }}" \
            -e PAYMENT_DEEP_LINK_HOST="${{ secrets.PAYMENT_DEEP_LINK_HOST }}" \
            -e PAYMENT_DEEP_LINK_PATH="${{ secrets.PAYMENT_DEEP_LINK_PATH }}" \
            -e PAYMENT_DEEP_LINK_SCHEME="${{ secrets.PAYMENT_DEEP_LINK_SCHEME }}" \
            -e BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            $IMAGE_NAME:$IMAGE_TAG
# #            ~/deploy/update.sh "${{ secrets.D_USERNAME }}" "${{ secrets.D_PASSWORD }}" "${{ github.sha }}"